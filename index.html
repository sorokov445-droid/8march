  <title>Цитаты</title>
  <style>
    :root {
      --bg1:#fff8fb; --bg2:#f6edf6; --card:rgba(255,255,255,.82); --text:#2f2430;
      --muted:#6c5c69; --accent:#d85e92; --accent2:#b84575; --shadow:0 14px 35px rgba(110,65,92,.16);
      --radius:22px;
      --bg1: #fff8fc;
      --bg2: #f5edf5;
      --text: #2f2430;
      --muted: #746775;
      --accent: #d85e92;
      --accent2: #b84575;
      --glass: rgba(255,255,255,0.78);
      --shadow: 0 14px 34px rgba(98, 63, 84, 0.14);
      --ui-font: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --quote-font: Lora, Georgia, "Times New Roman", serif;
      --radius: 22px;
    }
    *{box-sizing:border-box} html,body{margin:0;padding:0}
    body{
      min-height:100vh; font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; color:var(--text);

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: var(--ui-font);
      color: var(--text);
      background:
        radial-gradient(circle at 18% 12%, rgba(255,212,233,.55), transparent 42%),
        radial-gradient(circle at 88% 8%, rgba(255,230,241,.5), transparent 38%),
        radial-gradient(circle at 14% 8%, rgba(255, 214, 234, 0.55), transparent 40%),
        radial-gradient(circle at 92% 8%, rgba(255, 228, 240, 0.45), transparent 35%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      display:flex; justify-content:center; padding:max(14px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
    }
    .app{width:100%;max-width:540px;display:flex;flex-direction:column;gap:14px}
    .card{background:var(--card);backdrop-filter:blur(8px);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.7);padding:16px}
    .preview-canvas{width:100%;height:auto;border-radius:16px;display:block;background:transparent;box-shadow:none}
    .controls{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    button{appearance:none;border:none;border-radius:14px;padding:12px 14px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.08)}
    button:disabled{opacity:.55;cursor:wait}
    .btn-primary{color:#fff;background:linear-gradient(180deg,var(--accent),var(--accent2))}
    .btn-secondary{color:var(--text);background:rgba(255,255,255,.88);border:1px solid rgba(0,0,0,.06)}
    .status{margin:0;font-size:13px;color:var(--muted);min-height:1.2em;text-align:center}
    .hint{margin:0;font-size:12px;color:var(--muted);line-height:1.45;text-align:center}
    .tune{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.72);border:1px solid rgba(0,0,0,.05);border-radius:12px;padding:10px 12px}
    .tune label{font-size:13px;color:var(--muted);white-space:nowrap}
    .tune input[type="range"]{flex:1}
    .tune .value{min-width:44px;text-align:right;font:600 13px Inter,sans-serif;color:var(--text)}
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: max(14px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
    }

    .app {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .shell {
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      backdrop-filter: blur(8px);
    }

    .preview-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: transparent;
      border-radius: 16px;
      box-shadow: none;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .08s ease, opacity .15s ease;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .55; cursor: wait; }

    .btn-secondary {
      background: rgba(255,255,255,0.9);
      color: var(--text);
      border: 1px solid rgba(0,0,0,0.05);
    }
    .btn-primary {
      color: #fff;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
    }

    .status {
      margin: 0;
      min-height: 1.25em;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .hidden { display: none; }

    @media (max-width: 380px) {
      .shell { padding: 12px; }
      button { font-size: 14px; padding: 12px; }
    }

<body>
<div class="app">
  <div class="card"><canvas id="previewCanvas" class="preview-canvas" aria-label="Карточка с цитатой"></canvas></div>
  <div class="controls">
    <button id="newQuoteBtn" class="btn-secondary" type="button">Другая цитата</button>
    <button id="saveBtn" class="btn-primary" type="button">Сохранить</button>
  </div>
  <div class="tune">
    <label for="xOffsetRange">Сдвиг X</label>
    <input id="xOffsetRange" type="range" min="-40" max="40" step="1" value="0" />
    <span id="xOffsetValue" class="value">0 px</span>
  <div class="app">
    <div class="shell">
      <div class="preview-wrap">
        <canvas id="previewCanvas" aria-label="Карточка с цитатой"></canvas>
      </div>
    </div>

    <div class="controls">
      <button id="newBtn" class="btn-secondary" type="button">Другая цитата</button>
      <button id="saveBtn" class="btn-primary" type="button">Сохранить</button>
    </div>

    <p id="status" class="status">Загружаем цитаты...</p>

    <img id="photoLoader" class="hidden" alt="" crossorigin="anonymous" />
  </div>
  <p id="status" class="status">Загружаем цитаты…</p>
  <p class="hint">Формат строки: <i>текст цитаты (Автор) (photo.jpg)</i></p>
</div>
<script>
const state = { entries: [], current:null, lastIndex:-1, busy:false, imageCache:new Map(), xOffset: Number(localStorage.getItem('quoteCardXOffset') || 0) || 0 };
const canvas = document.getElementById('previewCanvas');
const ctx = canvas.getContext('2d');
const previewCard = canvas.closest('.card');
const statusEl = document.getElementById('status');
const newQuoteBtn = document.getElementById('newQuoteBtn');
const saveBtn = document.getElementById('saveBtn');
const xOffsetRange = document.getElementById('xOffsetRange');
const xOffsetValue = document.getElementById('xOffsetValue');

const fallbackEntries = [
  { quote:'Не знаешь, что делать - иди в библиотеку', author:'Джоан Роулинг', photo:'Rowling.jpg' },
  { quote:'Как ни странно, порою ошибки человеческие приносят человеку больше пользы, чем поступки и продуманные, и разумные', author:'Надежда Тэффи', photo:'Teffi.jpg' },
  { quote:'Счастье приходит изнутри, а не от других', author:'Агния Барто', photo:'Barto.jpg' },
  { quote:'Археолог — лучший муж, который только может быть у женщины. Чем старее она становится, тем больший интерес он к ней проявляет', author:'Агата Кристи', photo:'Kristi.jpg' },
  { quote:'У надежды глаза так же велики, как и у страха', author:'Зинаида Гиппиус', photo:'Gippius.jpg' }
];

function setStatus(t){ statusEl.textContent = t; }
function setBusy(v){ state.busy=v; newQuoteBtn.disabled=v; saveBtn.disabled=v; }
function updateOffsetUi(){ if(xOffsetRange) xOffsetRange.value = String(state.xOffset); if(xOffsetValue) xOffsetValue.textContent = `${state.xOffset} px`; }
function normalizePhotoFile(name){ const t=String(name||'').trim(); return /\.[a-z0-9]{2,5}$/i.test(t) ? t : (t ? t+'.jpg' : ''); }
function parseLine(line){ const m = line.match(/^(.*)\s*\(([^()]+)\)\s*\(([^()]+)\)\s*$/); return m ? {quote:m[1].trim(), author:m[2].trim(), photo:normalizePhotoFile(m[3])} : null; }

async function loadEntries(){
  try{
    const res = await fetch('citaty.txt', {cache:'no-store'});
    if(!res.ok) throw new Error('Нет файла citaty.txt');
    const txt = await res.text();
    const entries = txt.split(/\r?\n/).map(s=>s.trim()).filter(Boolean).map(parseLine).filter(Boolean);
    if(!entries.length) throw new Error('Не удалось распарсить строки');
    state.entries = entries;
  } catch(e){ console.warn(e); state.entries = fallbackEntries.slice(); }
}

function pickRandomEntry(){
  const arr = state.entries.length ? state.entries : fallbackEntries;
  let idx = 0;
  if(arr.length>1){ do { idx = Math.floor(Math.random()*arr.length); } while(idx===state.lastIndex); }
  state.lastIndex = idx; state.current = arr[idx]; return arr[idx];
}

function roundRectPath(c,x,y,w,h,r){ const rr=Math.min(r,w/2,h/2); c.beginPath(); c.moveTo(x+rr,y); c.arcTo(x+w,y,x+w,y+h,rr); c.arcTo(x+w,y+h,x,y+h,rr); c.arcTo(x,y+h,x,y,rr); c.arcTo(x,y,x+w,y,rr); c.closePath(); }

function wrapTextLines(c, text, maxWidth){
  const words = String(text||'').split(/\s+/).filter(Boolean); const lines=[]; let line='';
  for(const word of words){
    const test = line ? line+' '+word : word;
    if(c.measureText(test).width <= maxWidth){ line = test; continue; }
    if(line) lines.push(line);
    if(c.measureText(word).width > maxWidth){
      let part='';
      for(const ch of word){ const t=part+ch; if(c.measureText(t).width<=maxWidth) part=t; else { if(part) lines.push(part); part=ch; } }
      line = part;
    } else line = word;
  }
  if(line) lines.push(line);
  return lines.length ? lines : [''];
}

function drawLines(c, lines, x, y, lineHeight){ lines.forEach((ln,i)=>c.fillText(ln, x, y + i*lineHeight)); }

function createImageLoader(src){ return new Promise(resolve => { const img = new Image(); img.onload=()=>resolve(img); img.onerror=()=>resolve(null); img.src=src; }); }
async function getAuthorImage(src){ if(!src) return null; if(state.imageCache.has(src)) return state.imageCache.get(src); const p = createImageLoader(src); state.imageCache.set(src,p); return p; }
function drawPhotoCover(img,x,y,w,h){ const iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height; if(!iw||!ih)return; const borderCrop=1.04; const scale=Math.max(w/iw,h/ih)*borderCrop; const dw=iw*scale, dh=ih*scale; ctx.drawImage(img, x+(w-dw)/2, y+(h-dh)/2, dw, dh); }

async function renderCard(){
  const entry = state.current || {quote:'...',author:'Автор',photo:''};
  const DPR = Math.max(1, Math.min(window.devicePixelRatio||1, 2));
  // Берем реальную ширину контейнера, а не window.innerWidth, иначе на мобильных
  // canvas может стать шире внутренней области карточки и визуально 'съехать' вбок.
  const containerWidth = Math.floor((previewCard?.clientWidth || canvas.parentElement?.clientWidth || window.innerWidth) - 0);
  const cssWidth = Math.min(520, Math.max(300, containerWidth));

  // 1) Сначала считаем текст и нужную высоту, чтобы фон/рамка не "уезжали" вниз на коротких цитатах
  const quoteFont = Math.max(17, Math.round(cssWidth * .048));
  const lineHeight = Math.round(quoteFont * 1.34);
  ctx.setTransform(1,0,0,1,0,0);
  ctx.font = `500 ${quoteFont}px Lora, Georgia, serif`;

  const quoteBoxX = Math.round(cssWidth * .07);
  const quoteBoxW = cssWidth - quoteBoxX*2;
  const textW = quoteBoxW - 34;
  const lines = wrapTextLines(ctx, entry.quote || '...', textW);

  const baseHeight = Math.round(cssWidth * 1.52);
  const photoTop = Math.round(baseHeight * .05);
  const photoH = Math.round(baseHeight * .42);
  const quoteBoxY = Math.round(baseHeight * .52);
  const quoteBoxH = Math.max(Math.round(baseHeight * .18), 62 + (lines.length - 1) * lineHeight + 34);
  const authorY = quoteBoxY + quoteBoxH + 36;
  const neededHeight = authorY + 56; // нижний отступ под имя автора
  const cssHeight = Math.max(Math.round(cssWidth * 1.34), neededHeight);

  canvas.width = Math.round(cssWidth * DPR); canvas.height = Math.round(cssHeight * DPR);
  canvas.style.width = cssWidth+'px'; canvas.style.height = cssHeight+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0); ctx.clearRect(0,0,cssWidth,cssHeight);

  const ox = Number(state.xOffset||0);
  ctx.save();
  ctx.translate(ox, 0);

  const bg = ctx.createLinearGradient(0,0,0,cssHeight); bg.addColorStop(0,'#fffafc'); bg.addColorStop(1,'#fff2f7');
  ctx.fillStyle = bg; roundRectPath(ctx,0,0,cssWidth,cssHeight,18); ctx.fill();
  ctx.globalAlpha=.65; ctx.fillStyle='rgba(255,214,234,.55)'; ctx.beginPath(); ctx.arc(cssWidth*.15, Math.max(54, cssHeight*.11), cssWidth*.16, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,240,246,.95)'; ctx.beginPath(); ctx.arc(cssWidth*.86, Math.max(48, cssHeight*.10), cssWidth*.15, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  ctx.strokeStyle='rgba(216,94,146,.20)'; ctx.lineWidth=1.5; roundRectPath(ctx,8,8,cssWidth-16,cssHeight-16,16); ctx.stroke();

  const photoX = Math.round(cssWidth * .07), photoY = photoTop, photoW = cssWidth - photoX*2;
  // светлая подложка именно под фото, чтобы убрать темные углы от альфа-краев
  const img = await getAuthorImage(entry.photo);
  ctx.save(); roundRectPath(ctx, photoX, photoY, photoW, photoH, 16); ctx.clip();
  if(img) drawPhotoCover(img, photoX, photoY, photoW, photoH);
  else {
    const pg = ctx.createLinearGradient(photoX,photoY,photoX,photoY+photoH); pg.addColorStop(0,'#f0e4ea'); pg.addColorStop(1,'#eadbe5');
    ctx.fillStyle = pg; ctx.fillRect(photoX,photoY,photoW,photoH);
    ctx.fillStyle = '#8e7484'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font = `600 ${Math.max(14, Math.round(cssWidth*.04))}px Inter, sans-serif`;
    ctx.fillText(entry.photo || 'Фото не найдено', photoX + photoW/2, photoY + photoH/2);
  }
  ctx.restore();
  ctx.strokeStyle='rgba(216,94,146,.14)'; ctx.lineWidth=1; roundRectPath(ctx, photoX, photoY, photoW, photoH, 16); ctx.stroke();

  // Текст и динамическая подложка
  const textX = cssWidth / 2;
  const textY = quoteBoxY + 62;

  ctx.save(); ctx.shadowColor='rgba(125,70,100,.08)'; ctx.shadowBlur=18; ctx.shadowOffsetY=6; ctx.fillStyle='rgba(255,255,255,.92)';
  roundRectPath(ctx, quoteBoxX, quoteBoxY, quoteBoxW, quoteBoxH, 18); ctx.fill(); ctx.restore();
  ctx.strokeStyle='rgba(216,94,146,.12)'; ctx.lineWidth=1; roundRectPath(ctx, quoteBoxX, quoteBoxY, quoteBoxW, quoteBoxH, 18); ctx.stroke();

  ctx.fillStyle='rgba(216,94,146,.22)'; ctx.font=`700 ${Math.round(cssWidth*.16)}px Georgia, serif`; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillText('“', quoteBoxX+16, quoteBoxY+4);
  ctx.fillStyle='#302531'; ctx.font=`500 ${quoteFont}px Lora, Georgia, serif`; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  drawLines(ctx, lines, textX, textY, lineHeight);

  // Имя автора всегда сразу под белой подложкой
  ctx.fillStyle='rgba(108,92,105,.92)'; ctx.font=`600 ${Math.max(11, Math.round(cssWidth*.028))}px Inter, sans-serif`; ctx.textAlign='center';
  ctx.fillText(entry.author || 'Автор', cssWidth/2, Math.min(authorY, cssHeight - 20));
  ctx.restore();
}

async function refreshEntryAndRender(){ pickRandomEntry(); await renderCard(); setStatus('Готово. Можете сохранить картинку.'); }

async function saveImage(){
  setBusy(true); setStatus('Готовим изображение…');
  try{
    await renderCard();
    const blob = await new Promise((resolve,reject)=>canvas.toBlob(b=>b?resolve(b):reject(new Error('Не удалось создать PNG')), 'image/png'));
    const safeAuthor = (state.current?.author || 'author').replace(/[^\p{L}\p{N}]+/gu,'-').replace(/^-+|-+$/g,'') || 'author';
    const fileName = `quote-${safeAuthor}-${Date.now()}.png`;
    const file = new File([blob], fileName, {type:'image/png'});
    const canShare = typeof navigator.share === 'function' && navigator.canShare && navigator.canShare({files:[file]});
    if(canShare){ await navigator.share({files:[file], title:'Цитата'}); setStatus('Изображение отправлено через меню «Поделиться».'); }
    else { const url = URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=fileName; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url), 2000); setStatus('PNG скачан.'); }
  } catch(e){ console.error(e); setStatus('Не получилось сохранить изображение. Проверьте фото и https.'); }
  finally { setBusy(false); }
}

async function init(){ updateOffsetUi(); setBusy(true); await loadEntries(); await refreshEntryAndRender(); setBusy(false); }
newQuoteBtn.addEventListener('click', async ()=>{ if(state.busy) return; setBusy(true); try{ await refreshEntryAndRender(); } finally { setBusy(false); } });
saveBtn.addEventListener('click', saveImage);
xOffsetRange.addEventListener('input', ()=>{ state.xOffset = Number(xOffsetRange.value)||0; localStorage.setItem('quoteCardXOffset', String(state.xOffset)); updateOffsetUi(); renderCard(); });
window.addEventListener('resize', ()=>{ renderCard(); });
init();
</script>

  <script>
    const FALLBACK_ITEMS = [
      { quote: 'Счастье приходит изнутри, а не от других.', author: 'Агния Барто', photo: 'Barto.jpg' },
      { quote: 'У надежды глаза так же велики, как и у страха.', author: 'Зинаида Гиппиус', photo: 'Gippius.jpg' },
      { quote: 'Археолог — лучший муж, который только может быть у женщины.', author: 'Агата Кристи', photo: 'Kristi.jpg' },
      { quote: 'Как ни странно, порою ошибки человеческие приносят человеку больше пользы, чем поступки продуманные.', author: 'Надежда Тэффи', photo: 'Teffi.jpg' },
      { quote: 'Очень трудно стать взрослым, когда внутри всё ещё живёт ребёнок.', author: 'Дж. К. Роулинг', photo: 'Rowling.jpg' }
    ];

    const state = {
      items: [],
      current: null,
      lastIndex: -1,
      currentPhotoLoaded: false,
      busy: false
    };

    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d', { alpha: true });
    const photoLoader = document.getElementById('photoLoader');
    const statusEl = document.getElementById('status');
    const newBtn = document.getElementById('newBtn');
    const saveBtn = document.getElementById('saveBtn');

    function setStatus(text) { statusEl.textContent = text; }
    function setBusy(flag) {
      state.busy = flag;
      newBtn.disabled = flag;
      saveBtn.disabled = flag;
    }

    function parseLine(line) {
      const s = line.trim();
      if (!s) return null;

      // Формат: цитата (Автор) (photo.jpg)
      const m = s.match(/^(.*)\s*\(([^()]*)\)\s*\(([^()]*)\)\s*$/);
      if (m) {
        let quote = (m[1] || '').trim();
        let author = (m[2] || '').trim();
        let photo = (m[3] || '').trim();
        if (photo && !/\.[a-z0-9]{2,5}$/i.test(photo)) photo += '.jpg';
        if (quote) return { quote, author: author || 'Автор неизвестен', photo };
      }

      return { quote: s, author: 'Автор', photo: '' };
    }

    async function loadItems() {
      try {
        const res = await fetch('citaty.txt', { cache: 'no-store' });
        if (!res.ok) throw new Error('citaty.txt не найден');
        const txt = await res.text();
        const parsed = txt.split(/\r?\n/).map(parseLine).filter(Boolean);
        if (!parsed.length) throw new Error('citaty.txt пуст');
        state.items = parsed;
      } catch (e) {
        console.warn(e);
        state.items = [...FALLBACK_ITEMS];
      }
    }

    function pickRandomItem() {
      const arr = state.items.length ? state.items : FALLBACK_ITEMS;
      let idx = 0;
      if (arr.length > 1) {
        do idx = Math.floor(Math.random() * arr.length);
        while (idx === state.lastIndex);
      }
      state.lastIndex = idx;
      state.current = arr[idx];
      return state.current;
    }

    function roundRectPath(c, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      c.beginPath();
      c.moveTo(x + rr, y);
      c.arcTo(x + w, y, x + w, y + h, rr);
      c.arcTo(x + w, y + h, x, y + h, rr);
      c.arcTo(x, y + h, x, y, rr);
      c.arcTo(x, y, x + w, y, rr);
      c.closePath();
    }

    function splitWordsForWrap(text) {
      return text.replace(/\s+/g, ' ').trim().split(' ').filter(Boolean);
    }

    function wrapLines(c, text, maxWidth) {
      const words = splitWordsForWrap(text || '');
      if (!words.length) return [''];
      const lines = [];
      let line = '';
      for (const word of words) {
        const test = line ? (line + ' ' + word) : word;
        if (c.measureText(test).width <= maxWidth) {
          line = test;
        } else if (!line) {
          // длинное слово по символам
          let part = '';
          for (const ch of word) {
            const t = part + ch;
            if (c.measureText(t).width <= maxWidth) part = t;
            else {
              if (part) lines.push(part);
              part = ch;
            }
          }
          line = part;
        } else {
          lines.push(line);
          line = word;
        }
      }
      if (line) lines.push(line);
      return lines;
    }

    function drawRoundedImage(c, img, x, y, w, h, r) {
      c.save();
      roundRectPath(c, x, y, w, h, r);
      c.clip();
      c.drawImage(img, x, y, w, h);
      c.restore();
    }

    async function loadCurrentPhoto() {
      const item = state.current;
      state.currentPhotoLoaded = false;
      if (!item || !item.photo) return false;

      const candidates = [item.photo];
      if (!/\.[a-z0-9]{2,5}$/i.test(item.photo)) candidates.push(item.photo + '.jpg');

      for (const src of candidates) {
        const ok = await new Promise(resolve => {
          photoLoader.onload = () => resolve(true);
          photoLoader.onerror = () => resolve(false);
          photoLoader.src = src + (src.includes('?') ? '&' : '?') + 'v=' + Date.now();
        });
        if (ok && photoLoader.naturalWidth > 0) {
          state.currentPhotoLoaded = true;
          return true;
        }
      }
      return false;
    }

    function computeLayout(cssWidth) {
      const m = {
        pad: Math.round(cssWidth * 0.04),
        innerPad: Math.round(cssWidth * 0.06),
        gap1: Math.round(cssWidth * 0.035),
        gap2: Math.round(cssWidth * 0.03),
        gap3: Math.round(cssWidth * 0.035)
      };

      const cardX = 0;
      const cardY = 0;
      const cardW = cssWidth;
      const photoX = m.innerPad;
      const photoY = m.innerPad;
      const photoW = cardW - m.innerPad * 2;
      const photoH = Math.round(photoW * 0.62);

      const quoteBoxX = m.innerPad;
      const quoteBoxY = photoY + photoH + m.gap1;
      const quoteBoxW = cardW - m.innerPad * 2;

      const textPadX = Math.round(cssWidth * 0.055);
      const textTopPad = Math.round(cssWidth * 0.09);
      const textBottomPad = Math.round(cssWidth * 0.06);
      const quoteFontSize = Math.max(18, Math.round(cssWidth * 0.056));
      const lineHeight = Math.round(quoteFontSize * 1.34);
      const quoteTextMaxW = quoteBoxW - textPadX * 2;

      ctx.font = `600 ${quoteFontSize}px ${getComputedStyle(document.documentElement).getPropertyValue('--quote-font')}`;
      const lines = wrapLines(ctx, state.current?.quote || '', quoteTextMaxW);
      const quoteBoxH = Math.max(Math.round(cssWidth * 0.18), textTopPad + lines.length * lineHeight + textBottomPad);

      const authorY = quoteBoxY + quoteBoxH + m.gap2;
      const authorFontSize = Math.max(13, Math.round(cssWidth * 0.042));
      const authorBlockH = Math.round(authorFontSize * 1.5);

      const bottomPad = Math.round(cssWidth * 0.065);
      const cardH = authorY + authorBlockH + bottomPad;

      return {
        cardX, cardY, cardW, cardH,
        photoX, photoY, photoW, photoH,
        quoteBoxX, quoteBoxY, quoteBoxW, quoteBoxH,
        quoteFontSize, lineHeight, quoteTextMaxW, lines,
        quoteTextX: cardW / 2,
        quoteTextY: quoteBoxY + textTopPad,
        authorY, authorFontSize,
        quoteMarkX: quoteBoxX + Math.round(cssWidth * 0.045),
        quoteMarkY: quoteBoxY + Math.round(cssWidth * 0.018)
      };
    }

    function renderCard(options = {}) {
      const exportFlatCorners = !!options.exportFlatCorners;
      const hostWidth = Math.floor(canvas.parentElement.clientWidth || (window.innerWidth - 40));
      const cssWidth = Math.min(520, Math.max(300, hostWidth));
      const DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      const layout = computeLayout(cssWidth);
      const cssHeight = layout.cardH;

      canvas.width = Math.round(cssWidth * DPR);
      canvas.height = Math.round(cssHeight * DPR);
      canvas.style.width = cssWidth + 'px';
      canvas.style.height = cssHeight + 'px';

      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      ctx.clearRect(0, 0, cssWidth, cssHeight); // прозрачный фон вне карточки

      // Карточка
      const g = ctx.createLinearGradient(0, 0, 0, cssHeight);
      g.addColorStop(0, '#fff9fc');
      g.addColorStop(1, '#fff1f7');
      ctx.fillStyle = g;
      if (exportFlatCorners) {
        ctx.fillRect(layout.cardX, layout.cardY, layout.cardW, layout.cardH);
      } else {
        roundRectPath(ctx, layout.cardX, layout.cardY, layout.cardW, layout.cardH, 20);
        ctx.fill();
      }

      // Мягкие розовые пятна (строго внутри карточки)
      ctx.save();
      if (exportFlatCorners) {
        ctx.beginPath();
        ctx.rect(0, 0, layout.cardW, layout.cardH);
      } else {
        roundRectPath(ctx, 0, 0, layout.cardW, layout.cardH, 20);
      }
      ctx.clip();
      ctx.globalAlpha = 0.8;
      ctx.fillStyle = 'rgba(255, 214, 234, 0.45)';
      ctx.beginPath(); ctx.arc(cssWidth * 0.17, cssHeight * 0.16, cssWidth * 0.12, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255, 238, 246, 0.95)';
      ctx.beginPath(); ctx.arc(cssWidth * 0.86, cssHeight * 0.10, cssWidth * 0.10, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      // Рамка
      ctx.strokeStyle = 'rgba(216,94,146,0.20)';
      ctx.lineWidth = 1.4;
      if (exportFlatCorners) {
        ctx.strokeRect(8, 8, cssWidth - 16, cssHeight - 16);
      } else {
        roundRectPath(ctx, 8, 8, cssWidth - 16, cssHeight - 16, 16);
        ctx.stroke();
      }

      // Фото (без белой подложки)
      if (state.currentPhotoLoaded && photoLoader.naturalWidth > 0) {
        // cover crop
        const imgAR = photoLoader.naturalWidth / photoLoader.naturalHeight;
        const boxAR = layout.photoW / layout.photoH;
        let sx=0, sy=0, sw=photoLoader.naturalWidth, sh=photoLoader.naturalHeight;
        if (imgAR > boxAR) {
          sw = photoLoader.naturalHeight * boxAR;
          sx = (photoLoader.naturalWidth - sw) / 2;
        } else {
          sh = photoLoader.naturalWidth / boxAR;
          sy = (photoLoader.naturalHeight - sh) / 2;
        }
        ctx.save();
        roundRectPath(ctx, layout.photoX, layout.photoY, layout.photoW, layout.photoH, 16);
        ctx.clip();
        ctx.drawImage(photoLoader, sx, sy, sw, sh, layout.photoX, layout.photoY, layout.photoW, layout.photoH);
        ctx.restore();
      } else {
        ctx.fillStyle = '#f0e8ec';
        roundRectPath(ctx, layout.photoX, layout.photoY, layout.photoW, layout.photoH, 16);
        ctx.fill();
        ctx.fillStyle = '#8f7f89';
        ctx.font = `600 ${Math.max(14, Math.round(cssWidth * 0.04))}px ${getComputedStyle(document.documentElement).getPropertyValue('--ui-font')}`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Фото не найдено', cssWidth / 2, layout.photoY + layout.photoH / 2);
      }

      // Белая подложка ТОЛЬКО под текст цитаты, динамическая
      ctx.save();
      ctx.shadowColor = 'rgba(118, 77, 100, 0.10)';
      ctx.shadowBlur = 14;
      ctx.shadowOffsetY = 5;
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      roundRectPath(ctx, layout.quoteBoxX, layout.quoteBoxY, layout.quoteBoxW, layout.quoteBoxH, 16);
      ctx.fill();
      ctx.restore();
      ctx.strokeStyle = 'rgba(216,94,146,0.11)';
      ctx.lineWidth = 1;
      roundRectPath(ctx, layout.quoteBoxX, layout.quoteBoxY, layout.quoteBoxW, layout.quoteBoxH, 16);
      ctx.stroke();

      // Кавычка
      ctx.fillStyle = 'rgba(216,94,146,0.22)';
      ctx.font = `700 ${Math.round(cssWidth * 0.13)}px Georgia, serif`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText('“', layout.quoteMarkX, layout.quoteMarkY);

      // Текст цитаты
      ctx.fillStyle = '#2f2430';
      ctx.font = `600 ${layout.quoteFontSize}px ${getComputedStyle(document.documentElement).getPropertyValue('--quote-font')}`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      layout.lines.forEach((line, i) => {
        ctx.fillText(line, layout.quoteTextX, layout.quoteTextY + i * layout.lineHeight);
      });

      // Автор прямо под подложкой
      ctx.fillStyle = '#6f606c';
      ctx.font = `600 ${layout.authorFontSize}px ${getComputedStyle(document.documentElement).getPropertyValue('--ui-font')}`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(state.current?.author || 'Автор', cssWidth / 2, layout.authorY);
    }

    async function showRandom() {
      if (!state.items.length) return;
      setBusy(true);
      const item = pickRandomItem();
      setStatus('Загружаем фото...');
      await loadCurrentPhoto();
      renderCard();
      setStatus(`Готово. Можете сохранить картинку.${item.photo ? ' Фото: ' + item.photo : ''}`);
      setBusy(false);
    }

    async function savePng() {
      if (!state.current) return;
      setBusy(true);
      setStatus('Готовим PNG...');
      try {
        renderCard({ exportFlatCorners: true });
        const blob = await new Promise((resolve, reject) => {
          canvas.toBlob(b => b ? resolve(b) : reject(new Error('toBlob вернул null')), 'image/png');
        });
        const filename = `quote-${Date.now()}.png`;
        const file = new File([blob], filename, { type: 'image/png' });

        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: 'Цитата', text: 'Карточка с цитатой' });
          setStatus('PNG открыт через меню «Поделиться».');
        } else {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 2000);
          setStatus('PNG сохранён в загрузки.');
        }
      } catch (e) {
        console.error(e);
        setStatus('Не удалось сохранить PNG. Для GitHub Pages нужен https, и фото должны быть рядом с index.html.');
      } finally {
        setBusy(false);
      }
    }

    async function init() {
      setBusy(true);
      await loadItems();
      await showRandom();
      setBusy(false);
    }

    newBtn.addEventListener('click', showRandom);
    saveBtn.addEventListener('click', savePng);
    window.addEventListener('resize', () => { if (state.current) renderCard(); });

    init();
  </script>
</body>
</html>
