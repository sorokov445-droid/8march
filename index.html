<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7eef3" />
  <title>Цитаты с авторами</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg1: #fff8fb;
      --bg2: #f7eef7;
      --card: rgba(255,255,255,0.82);
      --text: #2f2430;
      --muted: #6c5c69;
      --accent: #d85e92;
      --accent2: #b84575;
      --shadow: 0 14px 35px rgba(110, 65, 92, 0.16);
      --radius: 22px;
      --quote-font: 'Lora', Georgia, 'Times New Roman', serif;
      --ui-font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: var(--ui-font);
      color: var(--text);
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 212, 233, 0.55), transparent 42%),
        radial-gradient(circle at 88% 8%, rgba(255, 230, 241, 0.5), transparent 38%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: max(14px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
    }
    .app {
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .card {
      background: var(--card);
      backdrop-filter: blur(8px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.7);
      padding: 16px;
    }
    .preview-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .preview-canvas {
      width: 100%;
      height: auto;
      border-radius: 16px;
      display: block;
      background: #fff;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    button {
      appearance: none;
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .08s ease, opacity .15s ease, box-shadow .15s ease;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }
    button:active { transform: translateY(1px) scale(0.995); }
    button:disabled { opacity: .55; cursor: wait; }
    .btn-primary { color: white; background: linear-gradient(180deg, var(--accent), var(--accent2)); }
    .btn-secondary { color: var(--text); background: rgba(255,255,255,0.88); border: 1px solid rgba(0,0,0,0.06); }
    .status { margin: 0; font-size: 13px; color: var(--muted); min-height: 1.2em; text-align: center; }
    .hint { margin: 0; font-size: 12px; color: var(--muted); line-height: 1.45; text-align: center; }
    @media (max-width: 360px) {
      .card { padding: 12px; }
      button { font-size: 14px; padding: 11px 12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <div class="preview-wrap">
        <canvas id="previewCanvas" class="preview-canvas" aria-label="Карточка с цитатой и автором"></canvas>
      </div>
    </div>

    <div class="controls">
      <button id="newQuoteBtn" class="btn-secondary" type="button">Другая цитата</button>
      <button id="saveBtn" class="btn-primary" type="button">Сохранить</button>
    </div>

    <p id="status" class="status">Загружаем цитаты…</p>
    <p class="hint">Формат строки в <b>citaty.txt</b>: <i>текст цитаты (Автор) (photo.jpg)</i>. Фото положите рядом с <b>index.html</b>. Если у файла забыли расширение, сайт попробует добавить <b>.jpg</b>, потому что идеальные исходники бывают только в легендах.</p>
  </div>

  <script>
    const state = {
      entries: [],
      current: null,
      lastIndex: -1,
      busy: false,
      imageCache: new Map(),
    };

    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const newQuoteBtn = document.getElementById('newQuoteBtn');
    const saveBtn = document.getElementById('saveBtn');

    const fallbackEntries = [
      { quote: 'Не знаешь, что делать - иди в библиотеку', author: 'Джоан Роулинг', photo: 'Rowling.jpg' },
      { quote: 'Как ни странно, порою ошибки человеческие приносят человеку больше пользы, чем поступки и продуманные, и разумные', author: 'Надежда Тэффи', photo: 'Teffi.jpg' },
      { quote: 'Счастье приходит изнутри, а не от других', author: 'Агния Барто', photo: 'Barto.jpg' },
      { quote: 'Археолог — лучший муж, который только может быть у женщины. Чем старее она становится, тем больший интерес он к ней проявляет', author: 'Агата Кристи', photo: 'Kristi.jpg' },
      { quote: 'У надежды глаза так же велики, как и у страха', author: 'Зинаида Гиппиус', photo: 'Gippius.jpg' }
    ];

    function setStatus(text) { statusEl.textContent = text; }
    function setBusy(flag) {
      state.busy = flag;
      newQuoteBtn.disabled = flag;
      saveBtn.disabled = flag;
    }

    function normalizePhotoFile(name) {
      const trimmed = String(name || '').trim();
      if (!trimmed) return '';
      if (/\.[a-z0-9]{2,5}$/i.test(trimmed)) return trimmed;
      return trimmed + '.jpg';
    }

    function parseLine(line) {
      const m = line.match(/^(.*)\s*\(([^()]+)\)\s*\(([^()]+)\)\s*$/);
      if (!m) return null;
      return {
        quote: m[1].trim(),
        author: m[2].trim(),
        photo: normalizePhotoFile(m[3])
      };
    }

    async function loadEntries() {
      try {
        const res = await fetch('citaty.txt', { cache: 'no-store' });
        if (!res.ok) throw new Error('Нет файла citaty.txt');
        const txt = await res.text();
        const entries = txt.split(/\r?\n/)
          .map(s => s.trim())
          .filter(Boolean)
          .map(parseLine)
          .filter(Boolean);

        if (!entries.length) throw new Error('Не удалось распарсить строки');
        state.entries = entries;
      } catch (e) {
        console.warn('Использую fallback:', e);
        state.entries = fallbackEntries.slice(0, 5);
      }
    }

    function pickRandomEntry() {
      const arr = state.entries.length ? state.entries : fallbackEntries;
      if (arr.length === 1) {
        state.lastIndex = 0;
        state.current = arr[0];
        return arr[0];
      }
      let idx;
      do {
        idx = Math.floor(Math.random() * arr.length);
      } while (idx === state.lastIndex && arr.length > 1);
      state.lastIndex = idx;
      state.current = arr[idx];
      return arr[idx];
    }

    function roundRectPath(context, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      context.beginPath();
      context.moveTo(x + rr, y);
      context.arcTo(x + w, y, x + w, y + h, rr);
      context.arcTo(x + w, y + h, x, y + h, rr);
      context.arcTo(x, y + h, x, y, rr);
      context.arcTo(x, y, x + w, y, rr);
      context.closePath();
    }

    function drawWrappedText(context, text, x, y, maxWidth, lineHeight) {
      const words = text.split(/\s+/).filter(Boolean);
      const lines = [];
      let line = '';
      for (const word of words) {
        const test = line ? line + ' ' + word : word;
        if (context.measureText(test).width <= maxWidth) {
          line = test;
        } else {
          if (line) lines.push(line);
          if (context.measureText(word).width > maxWidth) {
            let part = '';
            for (const ch of word) {
              const t = part + ch;
              if (context.measureText(t).width <= maxWidth) part = t;
              else {
                if (part) lines.push(part);
                part = ch;
              }
            }
            line = part;
          } else {
            line = word;
          }
        }
      }
      if (line) lines.push(line);
      lines.forEach((ln, i) => context.fillText(ln, x, y + i * lineHeight));
      return lines.length;
    }

    function createImageLoader(src) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve({ ok: true, img });
        img.onerror = () => resolve({ ok: false, img: null });
        img.src = src;
      });
    }

    async function getAuthorImage(src) {
      if (!src) return null;
      if (state.imageCache.has(src)) return state.imageCache.get(src);
      const p = createImageLoader(src).then(r => r.ok ? r.img : null);
      state.imageCache.set(src, p);
      return p;
    }

    function drawPhotoCover(img, x, y, w, h) {
      const iw = img.naturalWidth || img.width;
      const ih = img.naturalHeight || img.height;
      if (!iw || !ih) return;
      const scale = Math.max(w / iw, h / ih);
      const dw = iw * scale;
      const dh = ih * scale;
      const dx = x + (w - dw) / 2;
      const dy = y + (h - dh) / 2;
      ctx.drawImage(img, dx, dy, dw, dh);
    }

    async function renderCard() {
      const entry = state.current || { quote: '...', author: 'Автор', photo: '' };
      const DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      const cssWidth = Math.min(520, Math.max(300, window.innerWidth - 28));
      const cssHeight = Math.round(cssWidth * 1.48);
      canvas.width = Math.round(cssWidth * DPR);
      canvas.height = Math.round(cssHeight * DPR);
      canvas.style.width = cssWidth + 'px';
      canvas.style.height = cssHeight + 'px';

      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      ctx.clearRect(0, 0, cssWidth, cssHeight);

      const bg = ctx.createLinearGradient(0, 0, 0, cssHeight);
      bg.addColorStop(0, '#fffafc');
      bg.addColorStop(1, '#fff2f7');
      ctx.fillStyle = bg;
      roundRectPath(ctx, 0, 0, cssWidth, cssHeight, 18);
      ctx.fill();

      ctx.globalAlpha = 0.65;
      ctx.fillStyle = 'rgba(255, 214, 234, 0.55)';
      ctx.beginPath(); ctx.arc(cssWidth * 0.15, cssHeight * 0.13, cssWidth * 0.16, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255, 240, 246, 0.95)';
      ctx.beginPath(); ctx.arc(cssWidth * 0.86, cssHeight * 0.12, cssWidth * 0.15, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;

      ctx.strokeStyle = 'rgba(216, 94, 146, 0.20)';
      ctx.lineWidth = 1.5;
      roundRectPath(ctx, 8, 8, cssWidth - 16, cssHeight - 16, 16);
      ctx.stroke();

      const photoX = Math.round(cssWidth * 0.07);
      const photoY = Math.round(cssHeight * 0.05);
      const photoW = cssWidth - photoX * 2;
      const photoH = Math.round(cssHeight * 0.43);

      ctx.save();
      roundRectPath(ctx, photoX, photoY, photoW, photoH, 16);
      ctx.clip();

      const authorImg = await getAuthorImage(entry.photo);
      if (authorImg) {
        drawPhotoCover(authorImg, photoX, photoY, photoW, photoH);
      } else {
        const pg = ctx.createLinearGradient(photoX, photoY, photoX, photoY + photoH);
        pg.addColorStop(0, '#f0e4ea');
        pg.addColorStop(1, '#eadbe5');
        ctx.fillStyle = pg;
        ctx.fillRect(photoX, photoY, photoW, photoH);
        ctx.fillStyle = '#8e7484';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `600 ${Math.max(14, Math.round(cssWidth * 0.04))}px Inter, sans-serif`;
        ctx.fillText(entry.photo || 'Фото не найдено', photoX + photoW / 2, photoY + photoH / 2 - 12);
        ctx.font = `500 ${Math.max(11, Math.round(cssWidth * 0.028))}px var(--ui-font)`;
        ctx.fillText('Добавьте файл рядом с index.html', photoX + photoW / 2, photoY + photoH / 2 + 16);
      }
      ctx.restore();

      ctx.strokeStyle = 'rgba(216, 94, 146, 0.14)';
      ctx.lineWidth = 1;
      roundRectPath(ctx, photoX, photoY, photoW, photoH, 16);
      ctx.stroke();

      const quoteBoxX = Math.round(cssWidth * 0.07);
      const quoteBoxY = Math.round(cssHeight * 0.52);
      const quoteBoxW = cssWidth - quoteBoxX * 2;
      const quoteBoxH = Math.round(cssHeight * 0.36);

      ctx.save();
      ctx.shadowColor = 'rgba(125, 70, 100, 0.08)';
      ctx.shadowBlur = 18;
      ctx.shadowOffsetY = 6;
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      roundRectPath(ctx, quoteBoxX, quoteBoxY, quoteBoxW, quoteBoxH, 18);
      ctx.fill();
      ctx.restore();

      ctx.strokeStyle = 'rgba(216, 94, 146, 0.12)';
      ctx.lineWidth = 1;
      roundRectPath(ctx, quoteBoxX, quoteBoxY, quoteBoxW, quoteBoxH, 18);
      ctx.stroke();

      ctx.fillStyle = 'rgba(216, 94, 146, 0.22)';
      ctx.font = `700 ${Math.round(cssWidth * 0.16)}px Georgia, serif`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText('“', quoteBoxX + 16, quoteBoxY + 4);

      const quote = entry.quote || '...';
      const quoteFont = Math.max(17, Math.round(cssWidth * 0.048));
      const lineHeight = Math.round(quoteFont * 1.34);
      ctx.fillStyle = '#302531';
      ctx.font = `500 ${quoteFont}px Lora, Georgia, serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      const lines = drawWrappedText(ctx, quote, cssWidth / 2, quoteBoxY + 62, quoteBoxW - 34, lineHeight);

      const authorY = Math.min(quoteBoxY + quoteBoxH - 42, quoteBoxY + 70 + lines * lineHeight + 18);
      ctx.fillStyle = '#7c6171';
      ctx.font = `600 ${Math.max(12, Math.round(cssWidth * 0.032))}px Inter, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('— ' + (entry.author || 'Автор'), cssWidth / 2, authorY);

      ctx.fillStyle = 'rgba(108, 92, 105, 0.88)';
      ctx.font = `500 ${Math.max(10, Math.round(cssWidth * 0.026))}px Inter, sans-serif`;
      ctx.fillText('Случайная цитата', cssWidth / 2, cssHeight - 22);
    }

    async function refreshEntryAndRender() {
      pickRandomEntry();
      await renderCard();
      const fileNameNote = state.current?.photo ? ` Фото: ${state.current.photo}` : '';
      setStatus('Готово. Можете сохранить картинку.' + fileNameNote);
    }

    async function saveImage() {
      setBusy(true);
      setStatus('Готовим изображение…');
      try {
        await renderCard();
        const blob = await new Promise((resolve, reject) => {
          canvas.toBlob(b => b ? resolve(b) : reject(new Error('Не удалось создать PNG')), 'image/png');
        });

        const safeAuthor = (state.current?.author || 'author').replace(/[^\p{L}\p{N}]+/gu, '-').replace(/^-+|-+$/g, '') || 'author';
        const fileName = `quote-${safeAuthor}-${Date.now()}.png`;
        const file = new File([blob], fileName, { type: 'image/png' });

        const canShareFile = typeof navigator.share === 'function' && navigator.canShare && navigator.canShare({ files: [file] });
        if (canShareFile) {
          await navigator.share({ files: [file], title: 'Цитата', text: 'Картинка с цитатой' });
          setStatus('Изображение отправлено через меню «Поделиться».');
        } else {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 2000);
          setStatus('PNG скачан. Если это iPhone и браузер вредничает, сохраните из загрузок.');
        }
      } catch (err) {
        console.error(err);
        setStatus('Не получилось сохранить изображение. Проверьте https и наличие файлов фото рядом с index.html.');
      } finally {
        setBusy(false);
      }
    }

    async function init() {
      setBusy(true);
      await loadEntries();
      await refreshEntryAndRender();
      setBusy(false);
    }

    newQuoteBtn.addEventListener('click', async () => {
      if (state.busy) return;
      setBusy(true);
      try { await refreshEntryAndRender(); }
      finally { setBusy(false); }
    });

    saveBtn.addEventListener('click', saveImage);
    window.addEventListener('resize', () => { renderCard(); });

    init();
  </script>
</body>
</html>
